<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSentiment - Настройки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">P</div>
            <span class="logo-text">SmartSentiment</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Панель управления</span>
            </a>
            <a href="bots.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
                <span>Подключение ботов</span>
            </a>
            <a href="messages.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span>Сообщения</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Аналитика</span>
            </a>
            <a href="simulate.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span>Симуляция</span>
            </a>
            <a href="settings.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span>Настройки</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="diagnostics.html" class="nav-item" style="font-size:12px;opacity:0.5;">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                <span>Диагностика</span>
            </a>
            <a href="index.html" class="nav-item logout">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Выход</span>
            </a>
        </div>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Настройки</h1>
                <p class="page-subtitle">Управление аккаунтом и предпочтениями</p>
            </div>
        </div>
        <div class="settings-container">
            <div class="settings-tabs">
                <button class="tab-btn active" data-tab="profile">Профиль</button>
                <button class="tab-btn" data-tab="security">Безопасность</button>
                <button class="tab-btn" data-tab="ai">Настройки AI</button>
                <button class="tab-btn" data-tab="notifications">Уведомления</button>
            </div>
            <div class="settings-content">
                <div class="tab-panel active" id="tab-profile">
                    <div class="card">
                        <div class="card-header"><h3>Информация профиля</h3></div>
                        <div class="card-body">
                            <div class="avatar-section">
                                <div class="avatar-preview">
                                    <img id="avatarPreview" src="images/default-avatar.svg" alt="Аватар">
                                </div>
                                <label class="btn btn-secondary btn-sm">
                                    Загрузить фото
                                    <input type="file" id="avatarInput" accept="image/*" hidden onchange="uploadAvatar(this)">
                                </label>
                            </div>
                            <form id="profileForm">
                                <div class="form-group">
                                    <label for="profileName">Полное имя</label>
                                    <input type="text" id="profileName" name="name" value="Пользователь" required>
                                </div>
                                <div class="form-group">
                                    <label for="profileEmail">Email</label>
                                    <input type="email" id="profileEmail" name="email" value="user@example.com" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="tab-panel" id="tab-security">
                    <div class="card">
                        <div class="card-header"><h3>Смена пароля</h3></div>
                        <div class="card-body">
                            <form id="securityForm">
                                <div class="form-group">
                                    <label for="currentPassword">Текущий пароль</label>
                                    <input type="password" id="currentPassword" name="current_password" required>
                                </div>
                                <div class="form-group">
                                    <label for="newPassword">Новый пароль</label>
                                    <input type="password" id="newPassword" name="new_password" required>
                                </div>
                                <div class="form-group">
                                    <label for="confirmPassword">Подтвердите новый пароль</label>
                                    <input type="password" id="confirmPassword" name="confirm_password" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Сменить пароль</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="tab-panel" id="tab-ai">
                    <div class="card">
                        <div class="card-header"><h3>Конфигурация AI</h3></div>
                        <div class="card-body">
                            <form id="aiForm">
                                <div class="form-group">
                                    <label for="geminiApiKey">Gemini API Key</label>
                                    <input type="password" id="geminiApiKey" name="gemini_api_key" value="" placeholder="Введите ваш Gemini API ключ">
                                    <small style="color:var(--text-secondary);font-size:11px;margin-top:4px;display:block">Получить ключ: <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#2563EB">aistudio.google.com/apikey</a></small>
                                </div>
                                <div class="form-group">
                                    <label for="geminiModel">Выбор модели</label>
                                    <select id="geminiModel" name="gemini_model">
                                        <option value="gemini-2.5-pro" selected>Gemini 2.5 Pro</option>
                                        <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                                    </select>
                                </div>
                                <div style="display:flex;gap:10px;flex-wrap:wrap">
                                    <button type="submit" class="btn btn-primary">Сохранить настройки</button>
                                    <button type="button" class="btn btn-secondary" onclick="testGeminiConnection()" id="testGeminiBtn">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
                                        Тест Gemini подключения
                                    </button>
                                </div>
                                <div id="geminiTestResult" style="margin-top:14px;display:none"></div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="tab-panel" id="tab-notifications">
                    <div class="card">
                        <div class="card-header"><h3>Настройки уведомлений</h3></div>
                        <div class="card-body">
                            <form id="notificationsForm">
                                <div class="toggle-group">
                                    <label class="toggle-label">
                                        <span>Email-уведомления</span>
                                        <div class="toggle-switch">
                                            <input type="checkbox" name="email_notifications" checked>
                                            <span class="toggle-slider"></span>
                                        </div>
                                    </label>
                                    <label class="toggle-label">
                                        <span>Оповещения о жалобах</span>
                                        <div class="toggle-switch">
                                            <input type="checkbox" name="complaint_alerts" checked>
                                            <span class="toggle-slider"></span>
                                        </div>
                                    </label>
                                    <label class="toggle-label">
                                        <span>Оповещения высокого приоритета</span>
                                        <div class="toggle-switch">
                                            <input type="checkbox" name="high_priority_alerts" checked>
                                            <span class="toggle-slider"></span>
                                        </div>
                                    </label>
                                </div>
                                <button type="submit" class="btn btn-primary">Сохранить предпочтения</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<div id="toast-container"></div>
<script src="js/main.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
