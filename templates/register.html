{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="logo-icon large">P</div>
                <h1>SmartSentiment</h1>
            </div>
            <p class="auth-subtitle">Создайте учётную запись</p>
        </div>
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="name">Полное имя</label>
                <input type="text" id="name" name="name" placeholder="Введите ваше полное имя" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Введите ваш email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Создайте пароль" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Подтвердите пароль</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Подтвердите ваш пароль" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        </form>
        <p class="auth-footer-text">
            Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
        </p>
    </div>
</div>
<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    if (formData.get('password') !== formData.get('confirm_password')) {
        showToast('Пароли не совпадают', 'error');
        return;
    }
    const data = {
        name: formData.get('name'),
        email: formData.get('email'),
        password: formData.get('password'),
        confirm_password: formData.get('confirm_password')
    };
    fetch('{{ url_for("auth.register") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            window.location.href = '{{ url_for("dashboard.dashboard_page") }}';
        } else {
            showToast(d.message, 'error');
        }
    })
    .catch(() => showToast('Ошибка регистрации', 'error'));
});
</script>
{% endblock %}
