{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="logo-icon large">P</div>
                <h1>SmartSentiment</h1>
            </div>
            <p class="auth-subtitle">Войдите в свою учётную запись</p>
        </div>
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Введите ваш email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите ваш пароль" required>
            </div>
            <div class="form-row">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember_me">
                    <span>Запомнить меня</span>
                </label>
                <a href="#" class="forgot-link">Забыли пароль?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Войти</button>
        </form>
        <div class="auth-divider">
            <span>или продолжить с</span>
        </div>
        <a href="{{ url_for('auth.google_login') }}" class="btn btn-google btn-full">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Войти через Google
        </a>
        <p class="auth-footer-text">
            Нет аккаунта? <a href="{{ url_for('auth.register') }}">Зарегистрироваться</a>
        </p>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = {
        email: formData.get('email'),
        password: formData.get('password'),
        remember_me: formData.get('remember_me') ? 'on' : 'off'
    };
    fetch('{{ url_for("auth.login") }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(d => {
        if (d.success) {
            window.location.href = '{{ url_for("dashboard.dashboard_page") }}';
        } else {
            showToast(d.message, 'error');
        }
    })
    .catch(() => showToast('Ошибка входа', 'error'));
});
</script>
{% endblock %}
