<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSentiment - Регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <div class="logo-icon large">P</div>
                <h1>SmartSentiment</h1>
            </div>
            <p class="auth-subtitle">Создайте учётную запись</p>
        </div>
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="name">Полное имя</label>
                <input type="text" id="name" name="name" placeholder="Введите ваше полное имя" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Введите ваш email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Создайте пароль" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Подтвердите пароль</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Подтвердите ваш пароль" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Создать аккаунт</button>
        </form>
        <p class="auth-footer-text">
            Уже есть аккаунт? <a href="index.html">Войти</a>
        </p>
    </div>
</div>
<div id="toast-container"></div>
<script src="js/main.js"></script>
<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    if (formData.get('password') !== formData.get('confirm_password')) {
        showToast('Пароли не совпадают', 'error');
        return;
    }
    window.location.href = 'dashboard.html';
});
</script>
</body>
</html>
