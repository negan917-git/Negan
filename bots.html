            <a href="index.html" class="nav-item logout">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Выход</span>
            </a>
        </div>
    </aside>
    <main class="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Подключение ботов</h1>
                <p class="page-subtitle">Подключите ваших Telegram-ботов для получения и анализа сообщений</p>
            </div>
            <button class="btn btn-primary" onclick="showConnectModal()">Подключить бота</button>
        </div>
        <div id="botsContainer" class="bots-grid">
            <div class="loading">Загрузка ботов...</div>
        </div>
        <div id="connectModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Подключить нового бота</h3>
                    <button class="modal-close" onclick="hideConnectModal()">&times;</button>
                </div>
                <form id="connectBotForm">
                    <div class="form-group">
                        <label for="bot_name">Имя бота</label>
                        <input type="text" id="bot_name" name="bot_name" placeholder="Мой бот поддержки" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Telegram Username</label>
                        <input type="text" id="username" name="username" placeholder="@my_support_bot" required>
                    </div>
                    <div class="form-group">
                        <label for="token">Токен бота</label>
                        <input type="password" id="token" name="token" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11" required>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-secondary" onclick="hideConnectModal()">Отмена</button>
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<div id="toast-container"></div>
<script src="js/main.js"></script>
<script src="js/bots.js"></script>
</body>
</html>
